[[quote]]
japanese = "逃(にげ)ちゃダメだ"
translation = "You mustn't run away."
romaji = "Nigeccha dame da"
source = "Neon Genesis Evangelion"

[[quote]]
japanese = "人(ひと)は心(こころ)で生(い)きるんだ"
translation = "People live by their hearts."
romaji = "Hito wa kokoro de ikiru nda"
source = "Your Name"

[[quote]]
japanese = "諦(あきら)めたらそこで試合(しあい)終了(しゅうりょう)だよ"
translation = "If you give up, the game is over."
romaji = "Akirametara soko de shiai shūryō da yo"
source = "Slam Dunk"

[[quote]]
japanese = "人(ひと)はいつ死(し)ぬと思(おも)う？心(こころ)の中(なか)で誰(だれ)かに忘(わす)れられたときさ"
translation = "Do you know when people die? When they are forgotten in someone's heart."
romaji = "Hito wa itsu shinu to omou? Kokoro no naka de dareka ni wasurerareta toki sa"
source = "One Piece"

[[quote]]
japanese = "心(こころ)を燃(も)やせ"
translation = "Set your heart ablaze."
romaji = "Kokoro o moyase"
source = "Tengen Toppa Gurren Lagann"

[[quote]]
japanese = "道(みち)は自分(じぶん)で切(き)り開(ひら)くものだ"
translation = "You carve your own path."
romaji = "Michi wa jibun de kirihiraku mono da"
source = "Naruto"

[[quote]]
japanese = "命(いのち)より大事(だいじ)なものなんてない"
translation = "There's nothing more important than life."
romaji = "Inochi yori daiji na mono nante nai"
source = "Fullmetal Alchemist"

[[quote]]
japanese = "俺(おれ)の辞書(じしょ)に不可能(ふかのう)はない"
translation = "Impossible doesn't exist in my dictionary."
romaji = "Ore no jisho ni fukanō wa nai"
source = "One Piece"

[[quote]]
japanese = "人(ひと)は信(しん)じたいものを信(しん)じる"
translation = "People believe what they want to believe."
romaji = "Hito wa shinjitai mono o shinjiru"
source = "Death Note"

[[quote]]
japanese = "夢(ゆめ)を諦(あきら)めるな"
translation = "Never give up on your dreams."
romaji = "Yume o akirameru na"
source = "Fairy Tail"

[[quote]]
japanese = "本当(ほんとう)の強(つよ)さとは優(やさ)しさだ"
translation = "True strength is kindness."
romaji = "Hontō no tsuyosa to wa yasashisa da"
source = "Attack on Titan"

[[quote]]
japanese = "恐(おそ)れずに進(すす)め"
translation = "Move forward without fear."
romaji = "Osorezu ni susume"
source = "My Hero Academia"

[[quote]]
japanese = "生(い)きるってことは戦(たたか)うことだ"
translation = "To live is to fight."
romaji = "Ikiru tte koto wa tatakau koto da"
source = "Bleach"

[[quote]]
japanese = "逃(にげ)出(だ)した先(さき)に　楽園(らくえん)なんてありゃしねえのさ"
translation = "There is no paradise for you to escape to."
romaji = "nigedashita saki ni rakuen nante arya shinē nosa"
source = "Berserk"

[[quote]]
japanese = "アリを踏(ふみ)み潰(つぶ)すことを気(き)にしてたら歩(ある)くこともできゃしねえんだ"
translation = "If you worry about stepping on ants, you won't be able to walk."
romaji = "ari o fumi tsubusu koto o ki ni shitetara aruku koto mo dekyashinēnda"
source = "Berserk"

[[quote]]
japanese = "誰(だれ)のためでもない　自分(じぶん)が自分(じぶん)自身(じしん)のために成(な)す夢(ゆめ)です"
translation = "It's a dream I achieve for myself, not for anyone else."
romaji = "dare no tame de mo nai jibun ga jibun jishin no tame ni nasu yume desu"
source = "Berserk"

[[quote]]
japanese = "私(わたし)にとって友(とも)とはそんな…「対等(たいとう)な者(もの)」だと思っています"
translation = "To me, a friend is someone who is an equal."
romaji = "watakushi ni totte tomo to wa sonna taitou na mono da to omotte imasu"
source = "Berserk"

[[quote]]
japanese = "あいつは自分(じぶん)自身(じしん)をいつも極限(きょくげん)まで研(と)ぎ澄(す)ましておかなければならないんだ"
translation = "One has to constantly push himself to the limits."
romaji = "aitsu wa jibun jishin o itsu mo kyokugen made togisumashite okanakere ba naranai n da"
source = "Berserk"

[[quote]]
japanese = "今(いま)やんねぇやつは！一生(いっしょう)やりゃしねぇんだ！！"
translation = "If you don't do it now, you'll never do it in your life!!"
romaji = "ima yannei yatsu wa！isshō yaryashinei n da！！"
source = "Berserk"

[[quote]]
japanese = "自分(じぶん)の手(て)に負(お)えないならケンカなんて仕(し)掛(か)けるんじゃないよ"
translation = "Don't start a fight if it's beyond your control."
romaji = "jibun no te ni oenainara kenka nante shikakeru n ja nai yo"
source = "Berserk"

[[quote]]
japanese = "光(ひかり)が強(つよ)ければ強(つよ)いほど濃(こ)い影(かげ)が落(お)ちるものさ"
translation = "The stronger the light, the darker the shadows."
romaji = "hikari ga tsuyokereba tsuyoi hodo koi kage ga ochiru monosa"
source = "Berserk"

[[quote]]
japanese = "憎(にく)しみってやつはな、悲(かな)しみに面(おも)と向(む)かって腰(こし)を据(す)えらんねえやつが逃(に)げ込(こ)む場所(ばしょ)だ"
translation = "Hatred is a place where those who can't stand facing sadness can escape."
romaji = "nikushimi tte yatsu wana , kanashimi ni men to mukatte koshi o sue ranne e yatsu ga nigekomu bashoda"
source = "Berserk"

[[quote]]
japanese = "絶対(ぜったい)大丈夫(だいじょうぶ)だよ"
translation = "It'll absolutely be okay."
romaji = "Zettai daijōbu da yo"
source = "Cardcaptor Sakura (Kinomoto Sakura)"

[[quote]]
japanese = "君(きみ)はヒーローになれる"
translation = "You can become a hero."
romaji = "Kimi wa hīrō ni nareru"
source = "My Hero Academia (All Might)"

[[quote]]
japanese = "夢(ゆめ)は大(おお)きく、欲(よく)は小(ちい)さく。そういう気持(きも)ちで生(い)きるようにしろ。"
translation = "Dream big, want little. Live with that kind of attitude."
romaji = "Yume wa ōkiku, yoku wa chiisaku. Sō iu kimochi de ikiru yō ni shiro"
source = "Chibi Maruko-chan"

[[quote]]
japanese = "命(いのち)にかかわること以外(いがい)どーでもいいことばっかり..."
translation = "Everything except life-threatening matters is no big deal..."
romaji = "Inochi ni kakawaru koto igai dō demo ii koto bakkari..."
source = "Chibi Maruko-chan"

[[quote]]
japanese = "怖(こわ)い…自分(じぶん)の心(こころ)に踏(ふ)み込(こ)むのが怖(こわ)い"
translation = "Scary... It's scary to step into my own heart."
romaji = "Kowai... jibun no kokoro ni fumikomu no ga kowai"
source = "Erased"

[[quote]]
japanese = "善行(ぜんこう)も悪行(あっこう)も本質(ほんしつ)は同(おな)じ、人(ひと)が自(みずか)らの欠陥(けっかん)を補(おぎな)うための行為(こうい)に過(す)ぎない"
translation = "Good deeds and bad deeds are essentially the same, they're just actions people take to compensate for their own flaws."
romaji = "Zenkō mo akkō mo honshitsu wa onaji, hito ga mizukara no kekkan o oginau tame no kōi ni suginai"
source = "Erased"

[[quote]]
japanese = "このヒトデナシ！"
translation = "You bastards!"
romaji = "Kono hitodenashi!"
source = "South Park"

[[quote]]
japanese = "認(みと)めたくないものだな。自分(じぶん)自身(じしん)の若(わか)さ故(ゆえ)の過(あやま)ちというものを"
translation = "None want to admit them. The mistakes we make in our youth."
romaji = "Mitometakunai mono da na. Jibun jishin no wakasa yue no ayamachi to iu mono o"
source = "Mobile Suit Gundam"

[[quote]]
japanese = "こいつ…うごくぞ！"
translation = "This thing... it moves!"
romaji = "Koitsu... ugoku zo!"
source = "Mobile Suit Gundam"

[[quote]]
japanese = "当(あた)たらなければどうという事(こと)はない！"
translation = "If it doesn't hit, it doesn't matter!"
romaji = "Ataranakereba dō to iu koto wa nai!"
source = "Mobile Suit Gundam"

[[quote]]
japanese = "二度(にど)もぶった。親父(おやじ)にもぶたれた事(こと)ないのに！"
translation = "You hit me twice! Even my father never hit me!"
romaji = "Nidō mo butta. Oyaji ni mo butareta koto nai no ni!"
source = "Mobile Suit Gundam"

[[quote]]
japanese = "ザクとは違(ちが)うのだよ、ザクとは！"
translation = "This is no Zaku, boy! No Zaku!"
romaji = "Zaku to wa chigau no da yo, Zaku to wa!"
source = "Mobile Suit Gundam"

[[quote]]
japanese = "坊(ぼう)やだからさ"
translation = "Because [he was] a brat."
romaji = "Bōya da kara sa"
source = "Mobile Suit Gundam"

[[quote]]
japanese = "悲(かな)しいけどこれ戦争(せんそう)なのよね"
translation = "It's sad, but this is war."
romaji = "Kanashii kedo kore sensō nanoyone"
source = "Mobile Suit Gundam"

[[quote]]
japanese = "ごめんよ、僕(ぼく)にはまだ帰(かえ)れる所(とこ)があるんだ"
translation = "I'm sorry, but I still have a home to return to."
romaji = "Gomen yo, boku ni wa mada kaereru tokoro ga arun da"
source = "Mobile Suit Gundam"

[[quote]]
japanese = "あんなの飾(かざ)りです、偉(えら)い人(ひと)にはそれがわからんのですよ"
translation = "[Legs] are just for show. The higher-ups just don't get it."
romaji = "Anna no kazari desu, erai hito ni wa sore ga wakaran no desu yo"
source = "Mobile Suit Gundam"

[[quote]]
japanese = "俺(おれ)がガンダムだ！"
translation = "I am Gundam!"
romaji = "Ore ga Gandamu da!"
source = "Mobile Suit Gundam 00"

[[quote]]
japanese = "逃(にげ)たら一(ひと)つ、進(すす)めば二(ふた)つ"
translation = "Run and gain one, move forward and gain two."
romaji = "Nigetara hitotsu, susumeba futatsu"
source = "Mobile Suit Gundam: The Witch from Mercury"

[[quote]]
japanese = "二人(ふたり)のこの手(て)が真(ま)っ赤(か)に燃(も)える！幸(しあわ)せ掴(つか)めと轟(とどろ)き叫(さけ)ぶ！"
translation = "Our two hands glow bright red! Their loud roar tells us to grasp happiness!"
romaji = "Futari no kono te ga makka ni moeru! Shiawase tsukame to todoroki sakebu!"
source = "Mobile Fighter G Gundam"

[[quote]]
japanese = "殺(ころ)されたから殺(ころ)して… 殺(ころ)したから殺(ころ)されて… それで本当(ほんとう)に最後(さいご)は平和(へいわ)になるのかよ！"
translation = "One kills because another is killed! Then gets killed because they kill! How the hell is that going to bring us peace?"
romaji = "Korosareta kara koroshite... Koroshita kara korosarete... Sore de hontō ni saigo wa heiwa ni naru no ka yo!"
source = "Mobile Suit Gundam SEED"

[[quote]]
japanese = "俺(おれ)は止(と)まんねぇからよ、お前(まえ)らが止(と)まんねぇかぎり、その先(さき)に俺(おれ)はいるぞ！だからよ、止(と)まるんじゃねぇぞ…"
translation = "I won't stop, you see. As long as you guys don't stop, I'll be there ahead of you! That's why... don't you stop..."
romaji = "Ore wa toman nē kara yo, omae-ra ga toman nē kagiri, sono saki ni ore wa iru zo! Dakara yo, tomaru n ja nē zo..."
source = "Mobile Suit Gundam: Iron-Blooded Orphans"

[[quote]]
japanese = "今日(きょう)も一日(いちにち)がんばるぞい！"
translation = "I'll do my best today!"
romaji = "Kyō mo ichinichi ganbaru zoi!"
source = "New Game! (Suzukaze Aoba), anime ep. 4 / manga vol. 1"

[[quote]]
japanese = "一番(いちばん)願(ねが)ってたことは、絶対(ぜったい)に手(て)に入(はい)らないものなの。"
translation = "The thing you wished for the most, is something you'll never get."
romaji = "Ichiban negatteta koto wa, zettai ni te ni hairanai mono na no."
source = "Toradora! (Taiga Aisaka)"

[[quote]]
japanese = "犬(いぬ)の幸(しあわ)せはね、ご主人(しゅじん)様(さま)の役(やく)に立(た)てるかどうかで決(き)まるのよ。"
translation = "A dog's happiness is measured by how useful he is to his master."
romaji = "Inu no shiawase wa ne, goshujin-sama no yaku ni tateru ka dōka de kimaru no yo."
source = "Toradora! (Taiga Aisaka)"

[[quote]]
japanese = "正(ただ)しいとか間違(まちが)ってるとか、そんなことじゃない。もっと大事(だいじ)なことがある。だから謝罪(しゃざい)とか、許(ゆる)すことが必要(ひつよう)になるの。"
translation = "It's not about being right or being wrong. There are more important things than that. That's why apologies and forgiveness become necessary."
romaji = "Tadashii toka machigatteru toka, sonna koto ja nai. Motto daiji na koto ga aru. Dakara shazai toka, yurusu koto ga hitsuyō ni naru no."
source = "Toradora! (Taiga Aisaka)"

[[quote]]
japanese = "過去(かこ)にしがみつくのは、老人(ろうじん)のすることよ。"
translation = "Stop living in the past like an old man."
romaji = "Kako ni shigamitsuku no wa, rōjin no suru koto yo."
source = "Toradora! (Taiga Aisaka)"

[[quote]]
japanese = "涙(なみだ)ってね、心(こころ)の鼻血(はなじ)なんだよ。廊下(ろうか)で転(ころ)んだら鼻血(はなじ)が出(で)るでしょ？人生(じんせい)で転(ころ)んだら涙(なみだ)が出(で)るんだ。"
translation = "Tears just mean your heart's got a nosebleed. If you run through the halls and trip, you get a nosebleed. If you go through life and trip, you cry."
romaji = "Namida tte ne, kokoro no hanaji nanda yo. Rōka de korondara hanaji ga deru desho? Jinsei de korondara namida ga derun da."
source = "Toradora! (Minori Kushieda)"

[[quote]]
japanese = "自分(じぶん)の幸(しあわ)せは自分(じぶん)の手(て)でしか作(つく)れない。他(ほか)の誰(だれ)かに頼(たよ)るものじゃない！"
translation = "My happiness can only be made by my own hands. My happiness doesn't depend on anyone but me!"
romaji = "Jibun de shika tsukurenai. Hoka no dareka ni tayoru mono janai!"
source = "Toradora! (Minori Kushieda)"

[[quote]]
japanese = "理解(りかい)ってくれる人(ひと)がいる一人(ひとり)でもいれば、それでいいの。"
translation = "As long as there is at least one person who understands me, I'll be okay."
romaji = "Rikai shite kureru hito ga hitori demo ireba, sore de ii no."
source = "Toradora! (Ami Kawashima)"

[[quote]]
japanese = "もう足(あし)を上(あ)げたんでしょ？なら、もう一(ひと)つの選択肢(せんたくし)しかない！その足(あし)を踏(ふ)み出(だ)すのよ！"
translation = "Haven't you already lifted your foot, preparing to step forward? Then you only have one option! Finish taking that step!"
romaji = "Mō ashi o ageta n desho? Nara, mō hitotsu no sentakushi shika nai! Sono ashi o fumidasu no yo!"
source = "Toradora! (Sumire Kanō)"

[[quote]]
japanese = "勉強(べんきょう)はスポーツと違(ちが)って、やれば誰(だれ)でもできるようになるんだよ。できないのは、ただやってないだけ。"
translation = "Academics aren't like sports – anyone can pick this stuff up if they try. If you still can't do it, you're probably just not putting in the work."
romaji = "Benkyō wa supōtsu to chigatte, yareba dare demo dekiru yō ni narun da yo. Dekinai no wa, tada yattenai dake."
source = "A Place Further Than the Universe (Hinata Miyake, Episode 4)"

[[quote]]
japanese = "自分(じぶん)のためにも、本当(ほんとう)の気持(きも)ちはちゃんと言(い)わなきゃ。"
translation = "You need to say how you truly feel for your own sake."
romaji = "Jibun no tame ni mo, hontō no kimochi wa chanto iwanakya."
source = "My Dress-Up Darling (Marin Kitagawa)"

[[quote]]
japanese = "戻(もど)れるうちは、それは旅(たび)じゃない。戻(もど)れなくなったとき、初(はじ)めてそれは旅(たび)になるの。"
translation = "If you can still turn back, it's not really a journey. When you hit the point of no return, that's the moment it becomes a journey."
romaji = "Modoreru uchi wa, sore wa tabi janai. Modorenaku natta toki, hajimete sore wa tabi ni naru no."
source = "A Place Further Than the Universe (Hinata Miyake, Episode 2)"

[[quote]]
japanese = "逃(にげ)られない"
translation = "Can't run away."
romaji = "Nigerarenai"
source = "Neon Genesis Evangelion"

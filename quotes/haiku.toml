[[quote]]
japanese = "古池(ふるいけ)や\n蛙(かわず)飛(と)び込(こ)む\n水(みず)の音(おと)"
translation = "An old pond —\nA frog jumps in —\nThe sound of water."
romaji = "Furuike ya\nKawazu tobikomu\nMizu no oto"
source = "Matsuo Bashō"

[[quote]]
japanese = "夏草(なつくさ)や\n兵(つわもの)どもが\n夢(ゆめ)の跡(あと)"
translation = "Summer grasses—\nAll that remains\nOf warriors' dreams."
romaji = "Natsukusa ya\nTsuwamono-domo ga\nYume no ato"
source = "Matsuo Bashō"

[[quote]]
japanese = "静(しず)けさや\n岩(いわ)にしみ入(い)る\n蝉(せみ)の声(こえ)"
translation = "Such stillness—\nThe cicadas' cries\nSink into the rocks."
romaji = "Shizukesa ya\nIwa ni shimiiru\nSemi no koe"
source = "Matsuo Bashō"

[[quote]]
japanese = "春(はる)の海(うみ)\nひねもすのたり\nのたりかな"
translation = "Spring sea—\nAll day long\nWaves roll gently."
romaji = "Haru no umi\nHinemosu notari\nNotari kana"
source = "Matsuo Bashō"

[[quote]]
japanese = "秋(あき)深(ふか)き\n隣(となり)は何(なん)を\nする人(ひと)ぞ"
translation = "Deep autumn—\nWho lives next door\nAnd what do they do?"
romaji = "Aki fukaki\nTonari wa nani o\nSuru hito zo"
source = "Matsuo Bashō"

[[quote]]
japanese = "冬(ふゆ)ざれや\nかなしき鳥(とり)の\n声(こえ)する"
translation = "Winter desolation—\nThe sad voice\nOf a bird."
romaji = "Fuyuzare ya\nKanashiki tori no\nKoe suru"
source = "Matsuo Bashō"

[[quote]]
japanese = "夏(なつ)の夜(よ)や\n蛍(ほたる)の光(ひかり)\n消(き)えたり"
translation = "Summer night—\nThe glow of fireflies\nFades away."
romaji = "Natsu no yo ya\nHotaru no hikari\nKietari"
source = "Matsuo Bashō"

[[quote]]
japanese = "花(はな)の雲(くも)\n鐘(かね)は上野(うえの)か\n浅草(あさくさ)か"
translation = "Clouds of blossoms—\nIs that bell from Ueno?\nOr from Asakusa?"
romaji = "Hana no kumo\nKane wa Ueno ka\nAsakusa ka"
source = "Matsuo Bashō"

[[quote]]
japanese = "春雨(はるさめ)や\n川面(かわも)を濡(ぬら)す\n小舟(こぶね)かな"
translation = "Spring rain—\nIt wets the river's surface,\nA little boat floats."
romaji = "Harusame ya\nKawamo o nurasu\nKobune kana"
source = "Matsuo Bashō"

[[quote]]
japanese = "朝顔(あさがお)に\nつるべ取(と)られて\nもらい水(みず)"
translation = "Morning glory—\nMy well bucket was taken,\nGot water from neighbor."
romaji = "Asagao ni\nTsurube torarete\nMorai mizu"
source = "Kaga Chiyojo"

[[quote]]
japanese = "名月(めいげつ)や\n池(いけ)をめぐりて\n夜(よ)もすがら"
translation = "Bright moon—\nAround the pond\nAll night long."
romaji = "Meigetsu ya\nIke o megurite\nYo mo sugara"
source = "Matsuo Bashō"

[[quote]]
japanese = "春(はる)の山(やま)\n霞(かすみ)たなびく\n花(はな)の声(こえ)"
translation = "Spring mountains—\nMist floats by,\nVoices of flowers."
romaji = "Haru no yama\nKasumi tanabiku\nHana no koe"
source = "Matsuo Bashō"

[[quote]]
japanese = "松島(まつしま)や\nああ松島(まつしま)や\n松島(まつしま)かな"
translation = "Matsushima! Ah, Matsushima! Matsushima?"
romaji = "Matsushima ya\nAa Matsushima ya\nMatsushima kana"
source = "Tawara Bo"

[[quote]]
japanese = "荒海(あらうみ)や\n佐渡(さど)に横(よこ)たふ\n天(あま)の川(がわ)"
translation = "Rough sea—\nStretching across to Sado,\nThe Milky Way."
romaji = "Araumi ya\nSado ni yokotau\nAmanogawa"
source = "Matsuo Bashō"

[[quote]]
japanese = "菜(な)の花(はな)や\n月(つき)は東(ひがし)に\n日(ひ)は西(にし)に"
translation = "Rapeseed blossoms—\nThe moon in the east,\nThe sun in the west."
romaji = "Nanohana ya\nTsuki wa higashi ni\nHi wa nishi ni"
source = "Yosa Buson"

[[quote]]
japanese = "五月雨(さみだれ)を\nあつめて早(はや)し\n最上川(もがみがわ)"
translation = "Gathering the rains—\nSwift is the flow\nOf the Mogami River."
romaji = "Samidare o\nAtsumete hayashi\nMogamigawa"
source = "Matsuo Bashō"

[[quote]]
japanese = "おもしろき\nこともなき世(よ)を\nおもしろく"
translation = "A world of nothing—\nYet I make it\nFull of wonder."
romaji = "Omosoroki\nKoto mo naki yo o\nOmosoroku"
source = "Takarai Kikaku"

[[quote]]
japanese = "梅(うめ)が香(か)に\nのっと日(ひ)の出(で)る\n山路(やまみち)哉(かな)"
translation = "Amidst the plum blossoms' fragrance,\nThe sun rises abruptly—\nMountain path in spring."
romaji = "Ume ga kā ni\nNotto hi no deru\nYamaji kana"
source = "Matsuo Bashō"

[[quote]]
japanese = "やせ蛙(かえる)\n負(ま)けるな一茶(いっさ)\nこれにあり"
translation = "Lean frog,\nDon't lose—one Issa\nIs here with you."
romaji = "Yase gaeru\nMakeru na Issa\nKore ni ari"
source = "Kobayashi Issa"

[[quote]]
japanese = "柿(かき)食(く)えば\n鐘(かね)が鳴(な)るなり\n法隆寺(ほうりゅうじ)"
translation = "When eating persimmons,\nThe temple bell rings—\nHoryu-ji Temple."
romaji = "Kaki kueba\nKane ga naru nari\nHōryū-ji"
source = "Masaoka Shiki"

[[quote]]
japanese = "目(め)には青葉(あおば)\n山(やま)ほととぎす\n初鰹(はつがつお)"
translation = "Before my eyes,\nGreen leaves on mountains,\nCuckoo calls, first bonito."
romaji = "Me ni wa aoba\nYama hototogisu\nHatsugatsuo"
source = "Yamaguchi Sōdō"

[[quote]]
japanese = "行(ゆ)く春(はる)や\n鳥(とり)啼(な)き魚(うお)の\n目(め)は泪(なみだ)"
translation = "Passing spring—\nBirds sing, fish's eyes\nAre filled with tears."
romaji = "Yuku haru ya\nTori naki uo no\nMe wa namida"
source = "Matsuo Bashō"

[[quote]]
japanese = "五月雨(さみだれ)や\n色紙(しきし)へぎたる\n壁(かべ)の跡(あと)"
translation = "Five months of rain—\nTraces on the wall\nWhere color papers peeled."
romaji = "Samidare ya\nShikishi hegitaru\nKabe no ato"
source = "Matsuo Bashō"

[[quote]]
japanese = "雀(すずめ)の子(こ)\nそこのけそこのけ\nお馬(うま)が通(とお)る"
translation = "Sparrow's child,\nMove aside, move aside—\nHorse is passing through."
romaji = "Suzume no ko\nSoko no ke soko no ke\nOuma ga tooru"
source = "Kobayashi Issa"

[[quote]]
japanese = "鶯(うぐいす)や\n柳(やなぎ)のうしろ\n薮(やぶ)の前(まえ)"
translation = "Nightingale—\nBehind willow branches,\nIn front of thickets."
romaji = "Uguisu ya\nYanagi no ushiro\nYabu no mae"
source = "Matsuo Bashō"

[[quote]]
japanese = "梅(うめ)一輪(いちりん)\n一輪(いちりん)ほどの\nあたたかさ"
translation = "One plum blossom—\nAs warm as one blossom\nCan possibly be."
romaji = "Ume ichi-ron\nIchiron hodo no\nAtatakasa"
source = "Takahama Kyoshi"

[[quote]]
japanese = "万緑(ばんりょく)の\n中(なか)や吾子(わごこ)の歯(は)\n生(は)え初(はじ)むる"
translation = "Amidst the verdant green,\nMy child's first teeth\nBegin to emerge."
romaji = "Banshoku no\nnaka ya wagoko no ha\nhaehajimuru"
source = "Takahama Kyoshi"

[[quote]]
japanese = "枯枝(かれえだ)に\n烏(からす)のとまりけり\n秋(あき)の暮(く)れ"
translation = "On a withered branch —\nA crow has settled —\nAutumn evening."
romaji = "Kareeda ni\nKarasu no tomarikeri\nAki no kure"
source = "Matsuo Bashō"

[[quote]]
japanese = "旅(たび)に病(や)んで\n夢(ゆめ)は枯野(かれの)を\nかけ巡(めぐ)る"
translation = "Sick on my journey —\nMy dreams wander\nOver withered fields."
romaji = "Tabi ni yande\nYume wa kareno o\nKakemeguru"
source = "Matsuo Bashō"

[[quote]]
japanese = "木(こ)のもとに\n汁(しる)も膾(なます)も\n桜(さくら)かな"
translation = "Beneath the trees —\nSoup and fish salad too —\nCherry blossoms."
romaji = "Ko no moto ni\nShiru mo namasu mo\nSakura kana"
source = "Matsuo Bashō"

[[quote]]
japanese = "露(つゆ)の世(よ)は\n露(つゆ)の世(よ)ながら\nさりながら"
translation = "This world of dew —\nA world of dew it is,\nAnd yet..."
romaji = "Tsuyu no yo wa\nTsuyu no yo nagara\nSarinagara"
source = "Kobayashi Issa"

[[quote]]
japanese = "釣瓶(つるべ)落(お)ち\nおんどすがらの\n夜寒(よさむ)かな"
translation = "The well bucket falls —\nThe night is cold\nAll the way through."
romaji = "Tsurube ochi\nOndosugara no\nYosamu kana"
source = "Kobayashi Issa"

[[quote]]
japanese = "世(よ)の中(なか)は\n地獄(じごく)の上(うえ)の\n花見(はなみ)かな"
translation = "This world —\nOn top of hell\nA flower viewing."
romaji = "Yo no naka wa\nJigoku no ue no\nHanami kana"
source = "Kobayashi Issa"

[[quote]]
japanese = "水無月(みなづき)の\n虚空(こくう)に涼(すず)し\n時鳥(ほととぎす)"
translation = "In the coolness\nOf the empty sky of June —\nThe cuckoo."
romaji = "Minazuki no\nKoku ni suzushi\nHototogisu"
source = "Masaoka Shiki"

[[quote]]
japanese = "冬(ふゆ)山(やま)や\n鋭(するど)き風(かぜ)の\n声(こえ)する"
translation = "Winter mountains —\nThe sharp voice\nOf the wind."
romaji = "Fuyuyama ya\nSurudoki kaze no\nKoe suru"
source = "Yosa Buson"

[[quote]]
japanese = "春風(はるかぜ)や\n馬上(ばじょう)に眠(ねむ)る\nうぐいすか"
translation = "Spring breeze —\nSleeping on horseback,\nIs it a nightingale?"
romaji = "Harukaze ya\nBajō ni nemuru\nUguisu ka"
source = "Yosa Buson"

[[quote]]
japanese = "白魚(しらうお)や\n白銀(しろがね)もて\n照(て)る夜(よ)の空(そら)"
translation = "Whitebait —\nThe night sky illuminated\nBy silvery light."
romaji = "Shirauo ya\nShirogane mote\nTeru yo no sora"
source = "Santō Kyōden"

[[quote]]
japanese = "鎌倉(かまくら)を\n驚(おどろ)かしたる\n余寒(よかん)あり"
translation = "Kamakura\nHas been suprised by\nLingering winter cold."
romaji = "Kamakura o\nOdorokashitaru\nYokan ari"
source = "Takahama Kyoshi"

[[quote]]
japanese = "柔(やわ)らかに\n岸(きし)踏(ふ)みしなふ\n芦(あし)の角(つの)"
translation = "Softly stepping\nOn the shore, the reeds bend —\nNew shoots of reed."
romaji = "Yawaraka ni\nKishi fumishinau\nAshi no tsuno"
source = "Nakamura Teijo"

[[quote]]
japanese = "せりせりと\n薄氷(うすらい)杖(つえ)の\nなすままに"
translation = "Tap-tap-tapping —\nThe thin ice breaks\nJust as my cane wills."
romaji = "Seriseri to\nUsurai tsue no\nNasumama ni"
source = "Yamaguchi Seishi"

[[quote]]
japanese = "たんぽぽや\n一天(いってん)玉(たま)の\n如(ごと)くなり"
translation = "Dandelions in bloom —\nThe sky above\nRound as a jade ball."
romaji = "Tanpopo ya\nItten tama no\nGotoku nari"
source = "Nakamura Teijo"

[[quote]]
japanese = "山(やま)又(また)山(やま)\n山桜(やまざくら)又(また)\n山桜(やまざくら)"
translation = "Mountains upon mountains —\nWild cherry blossoms upon\nWild cherry blossoms."
romaji = "Yama mata yama\nYamazakura mata\nYamazakura"
source = "Awano Seiho"

[[quote]]
japanese = "赤(あか)い椿(つばき)\n白(しろ)い椿(つばき)と\n落(お)ちにけり"
translation = "Red camellias,\nWhite camellias too —\nThey have all fallen."
romaji = "Akai tsubaki\nShiroi tsubaki to\nOchinikeri"
source = "Kawahigashi Hekigoto"

[[quote]]
japanese = "美(うつく)しき\n緑(みどり)走(はし)れり\n夏料理(なつりょうり)"
translation = "Beautiful green\nRuns through the dish —\nSummer cuisine."
romaji = "Utsukushiki\nMidori hashireri\nNatsuryori"
source = "Hoshino Tatsuko"

[[quote]]
japanese = "母(はは)の日(ひ)の\n手(て)のひらの味(あじ)\n塩(しお)むすび"
translation = "On Mother's Day —\nThe taste of palm-pressed\nSalt rice ball."
romaji = "Haha no hi no\nTenohira no aji\nShiomusubi"
source = "Takaha Shugyo"

[[quote]]
japanese = "鮎(あゆ)くれて\nよらで過(す)ぎ行(ゆ)く\n夜半(よわ)の門(かど)"
translation = "Giving me sweetfish,\nThey pass without stopping —\nThe gate at midnight."
romaji = "Ayu kurete\nYorade sugiyuku\nYowa no kado"
source = "Yosa Buson"

[[quote]]
japanese = "旅(たび)終(お)えて\nよりB面(びーめん)の\n夏休(なつやす)み"
translation = "The trip is over —\nNow begins the B-side\nOf summer vacation."
romaji = "Tabi oete\nYori B-men no\nNatsuyasumi"
source = "Mayuzumi Madoka"

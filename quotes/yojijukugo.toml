[[quote]]
japanese = "三(さん)顧(こ)の礼(れい)"
translation = "Three visits in ceremony - Respect for talent"
romaji = "san ko no rei"
source = "四字熟語 - yojijukugo"

[[quote]]
japanese = "六(ろっ)根(こん)清(しょう)浄(じょう)"
translation = "Six roots pure [and] clean - Free from the worldly desires"
romaji = "rokkon shō jō"

[[quote]]
japanese = "八(はち)面(めん)六(ろっ)臂(ぴ)"
translation = "Eight faces, six arms - Extraordinarily capable"
romaji = "hachi men ro ppi"
source = "四字熟語 - yojijukugo"

[[quote]]
japanese = "万(まん)死(し)一(いっ)生(しょう)"
translation = "Ten-thousand deaths, one life - Narrow escape"
romaji = "ban shi i sshō"
source = "四字熟語 - yojijukugo"

[[quote]]
japanese = "一(いっ)寸(すん)光(こう)明(みょう)"
translation = "One length bright light - Glimmer of hope"
romaji = "i ssun kō myō"
source = "四字熟語 - yojijukugo"

[[quote]]
japanese = "一(いち)芸(げい)必(ひっ)達(たつ)"
translation = "One art must reach - Mastery"
romaji = "ichi gei hitsu tatsu"
source = "四字熟語 - yojijukugo"

[[quote]]
japanese = "一(いち)念(ねん)発(ほっ)起(き)"
translation = "One thought rises, [one] starts - Resolution"
romaji = "ichi nen ho kki"
source = "四字熟語 - yojijukugo"

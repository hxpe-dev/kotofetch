[[quote]]
japanese = "七(なな)転(ころ)び八(や)起(お)き"
translation = "Fall down seven times, stand up eight."
romaji = "Nanakorobi yaoki"
source = "Japanese proverb"

[[quote]]
japanese = "一期(いちご)一会(いちえ)"
translation = "Once in a lifetime encounter."
romaji = "Ichigo ichie"
source = "Japanese proverb"

[[quote]]
japanese = "猿(さる)も木(き)から落(お)ちる"
translation = "Even monkeys fall from trees."
romaji = "Saru mo ki kara ochiru"
source = "Japanese proverb"

[[quote]]
japanese = "雨(あめ)降(ふ)って地(ち)固(かた)まる"
translation = "After the rain, the ground hardens."
romaji = "Ame futte ji katamaru"
source = "Japanese proverb"

[[quote]]
japanese = "石(いし)の上(うえ)にも三(さん)年(ねん)"
translation = "Three years on a stone—perseverance pays off."
romaji = "Ishi no ue ni mo sannen"
source = "Japanese proverb"

[[quote]]
japanese = "花(はな)より団子(だんご)"
translation = "Dumplings over flowers—practicality over aesthetics."
romaji = "Hana yori dango"
source = "Japanese proverb"

[[quote]]
japanese = "二(に)兎(と)を追(お)う者(もの)は一(ひと)兎(と)をも得(え)ず"
translation = "Chase two rabbits, catch none."
romaji = "Nito o ou mono wa itto o mo ezu"
source = "Japanese proverb"

[[quote]]
japanese = "猫(ねこ)に小判(こばん)"
translation = "Gold coins to a cat—wasting something on someone who can't value it."
romaji = "Neko ni koban"
source = "Japanese proverb"

[[quote]]
japanese = "馬(うま)の耳(みみ)に念仏(ねんぶつ)"
translation = "Buddhist prayers in a horse's ear—preaching to deaf ears."
romaji = "Uma no mimi ni nenbutsu"
source = "Japanese proverb"

[[quote]]
japanese = "虎穴(こけつ)に入(い)らずんば虎子(こじ)を得(え)ず"
translation = "You cannot get a tiger cub without entering the tiger's cave."
romaji = "Koketsu ni irazunba koji o ezu"
source = "Adopted proverb"

[[quote]]
japanese = "口(くち)は災(わざわい)の元(もと)"
translation = "The mouth is the source of misfortune."
romaji = "Kuchi wa wazawai no moto"
source = "Japanese proverb"

[[quote]]
japanese = "井(い)の中(なか)の蛙(かわず)大海(たいかい)を知(し)らず"
translation = "A frog in a well does not know the ocean."
romaji = "I no naka no kawazu taikai o shirazu"
source = "Japanese proverb"

[[quote]]
japanese = "魚(うお)心(こころ)あれば水(みず)心(こころ)"
translation = "If the fish is willing, so is the water—mutual feelings matter."
romaji = "Uo gokoro areba mizu gokoro"
source = "Japanese proverb"

[[quote]]
japanese = "覆水(ふくすい)盆(ぼん)に返(かえ)らず"
translation = "Spilt water will not return to the tray—what's done is done."
romaji = "Fukusui bon ni kaerazu"
source = "Japanese proverb"

[[quote]]
japanese = "朱(し)の道(みち)は苦(くるし)しみだ"
translation = "The way of the master is pain."
romaji = "Shi no michi wa kurushimi da"
source = "Japanese proverb"

[[quote]]
japanese = "類(るい)は友(とも)を呼(よ)ぶ"
translation = "Simile simili gaudet—birds of a feather flock together."
romaji = "Rui wa tomo o yobu"
source = "Adopted proverb"

[[quote]]
japanese = "阿(あ)吽(うん)の呼吸(こきゅう)"
translation = "Wordless synchronicity."
romaji = "Aun no kokyū"
source = "Japanese proverb"

[[quote]]
japanese = "急(いそ)がば回(まわ)れ"
translation = "In a hurry, go the long way around."
romaji = "Isogeba maware"
source = "Japanese proverb"

[[quote]]
japanese = "転(てん)石(せき)苔(こけ)を生(しょう)ぜず"
translation = "A rolling stone gathers no moss."
romaji = "Tenseki koke o shōsezu"
source = "Adopted proverb"

[[quote]]
japanese = "鳶(とび)が鷹(たか)を生(う)む"
translation = "A kite gives birth to a hawk."
romaji = "Tobi ga taka o umu"
source = "Japanese proverb"

[[quote]]
japanese = "壁(かべ)に耳(みみ)あり障子(しょうじ)に目(め)あり"
translation = "Walls have ears, screens have eyes."
romaji = "Kabe ni mimi ari shōji ni me ari"
source = "Japanese proverb"

[[quote]]
japanese = "犬(いぬ)も歩(ある)けば棒(ぼう)に当(あ)たる"
translation = "A walking dog may get hit by a stick—Nothing ventured, nothing gained."
romaji = "Inu mo arukeba bō ni ataru"
source = "Japanese proverb"

[[quote]]
japanese = "昨日(きのう)は歴史(れきし)、明日(あした)は未知(みち)、しかし今日(きょう)は贈(おく)り物(もの)。だから「プレゼント」と呼(よ)ばれるのです。"
translation = "Yesterday is history, Tomorrow is a mystery, but Today is a gift. That is why it is called the present."
romaji = "Kinō wa rekishi, ashita wa michi, shikashi kyō wa okurimono. Dakara 'purezento' to yobareru no desu."
source = "Master Oogway"

[[quote]]
japanese = "ゆっくりしていってね!!!"
translation = "Take it easy~!!!"
romaji = "Yukkuri shite itte ne!!!"
source = "Yukkuri Marisa & Yukkuri Reimu"

[[quote]]
japanese = "案(あん)ずるより産(う)むが易(やす)し"
translation = "Giving birth is easier than worrying about it—Action is simpler than anxiety."
romaji = "Anzuru yori umu ga yasushi"
source = "Japanese proverb"

[[quote]]
japanese = "良薬(りょうやく)は口(くち)に苦(にが)し"
translation = "Good medicine tastes bitter—The best advice is often hard to hear."
romaji = "Ryōyaku wa kuchi ni nigashi"
source = "Adopted proverb"

[[quote]]
japanese = "知(し)らぬが仏(ほとけ)"
translation = "Not knowing is Buddha—Ignorance is bliss."
romaji = "Shiranu ga hotoke"
source = "Japanese proverb"

[[quote]]
japanese = "継続(けいぞく)は力(ちから)なり"
translation = "Continuity is power—Perseverance is the key to success."
romaji = "Keizoku wa chikara nari"
source = "Japanese proverb"

[[quote]]
japanese = "失敗(しっぱい)は成功(せいこう)の基(もと)"
translation = "Failure is the foundation of success."
romaji = "Shippai wa seikō no moto"
source = "Japanese proverb"

[[quote]]
japanese = "習(なら)うより慣(な)れろ"
translation = "Learn by doing—Practice over theory."
romaji = "Narau yori narero"
source = "Japanese proverb"
